# From-scratch PGP training with:
#   (a) all surrounding-agent feature tensors zeroed at every forward pass
#       (no other-vehicle / pedestrian information ever reaches the model)
#   (b) primary loss = rank-aware cross-entropy on the K=10 cluster
#       confidences, so the highest-confidence trajectory is the one closest
#       to GT, the second-highest the next closest, and so on.
#   (c) plain nuScenes trainval preprocessed pickles (pgp_preprocessed/),
#       NOT the DSVT-injected variant; trained from random initialization.
#
# This config is consumed by train_no_agents.py (not the stock train.py).
dataset: 'nuScenes'
version: 'v1.0-trainval'
agent_setting: 'single_agent'
input_representation: 'graphs'

train_set_args: &ds_args
  split: 'train'
  t_h: 2
  t_f: 6
  map_extent: [ -50, 50, -20, 80 ]
  polyline_resolution: 1
  polyline_length: 20
  traversal_horizon: 15
  random_flips: True

val_set_args:
  <<: *ds_args
  split: 'train_val'
  random_flips: False

test_set_args:
  <<: *ds_args
  split: 'val'
  random_flips: False

# Match the currently-running ranked_dsvt run's footprint so all three
# trainings can share the L4 without OOM.
batch_size: 16
num_workers: 2

encoder_type: 'pgp_encoder'
encoder_args:
  target_agent_feat_size: 5
  target_agent_emb_size: 16
  target_agent_enc_size: 32
  node_feat_size: 6
  node_emb_size: 16
  node_enc_size: 32
  nbr_feat_size: 5
  nbr_emb_size: 16
  nbr_enc_size: 32
  num_gat_layers: 2

aggregator_type: 'pgp'
aggregator_args:
  pre_train: False
  target_agent_enc_size: 32
  node_enc_size: 32
  pi_h1_size: 32
  pi_h2_size: 32
  horizon: 15
  num_samples: 1000
  emb_size: 128
  num_heads: 32

decoder_type: 'lvm_ranked_richctx'
decoder_args:
  num_samples: 1000
  op_len: 12
  hidden_size: 128
  encoding_size: 160
  agg_type: 'sample_specific'
  lv_dim: 5
  num_clusters: 10
  conf_hidden_size: 256
  target_agent_enc_size: 32

optim_args:
  lr: 0.001
  scheduler_step: 10
  scheduler_gamma: 0.5

# Primary objective is ranking_xent (weight 2.0). A small min_ade_k term
# (weight 0.25) keeps the K cluster trajectories from drifting into garbage
# while ranking learns. pi_bc (weight 0.5) supervises the lane-graph policy
# as in vanilla PGP.
losses: ['ranking_xent', 'min_ade_k', 'pi_bc']
loss_weights: [2.0, 0.25, 0.5]
loss_args:
  - temperature: 1.0
    use_softmax_target: False
  - k: 10
  - dummy: 0

# Use top1_ade as the first val metric → best.tar is the checkpoint with
# the lowest top-confidence ADE on val, matching the actual eval target.
tr_metrics: ['top1_ade', 'ranking_xent', 'min_ade_k', 'miss_rate_k', 'pi_bc']
tr_metric_args:
  - dummy: 0
  - temperature: 1.0
  - k: 10
  - k: 10
    dist_thresh: 2
  - dummy: 0

val_metrics: ['top1_ade', 'ranking_xent', 'min_ade_k', 'min_ade_k', 'miss_rate_k', 'miss_rate_k', 'pi_bc']
val_metric_args:
  - dummy: 0
  - temperature: 1.0
  - k: 5
  - k: 10
  - k: 5
    dist_thresh: 2
  - k: 10
    dist_thresh: 2
  - dummy: 0

log_freq: 100
