# Stage 1 (ranked-confidence variant): PGP non-ego training on DSVT-injected
# pickles, trained from scratch. Uses the lvm_ranked decoder (learnable
# confidence head) and adds a rank-aware cross-entropy loss so that the
# highest-confidence cluster is the one closest to GT, the second-highest is
# the next closest, and so on.
dataset: 'nuScenes'
version: 'v1.0-trainval'
agent_setting: 'single_agent'
input_representation: 'graphs'

train_set_args: &ds_args
  split: 'train'
  t_h: 2
  t_f: 6
  map_extent: [ -50, 50, -20, 80 ]
  polyline_resolution: 1
  polyline_length: 20
  traversal_horizon: 15
  random_flips: True

val_set_args:
  <<: *ds_args
  split: 'train_val'
  random_flips: False

test_set_args:
  <<: *ds_args
  split: 'val'
  random_flips: False

# Reduced batch size relative to stage 1 baseline (was 32) to leave headroom on
# the GPU while the unrelated stage-3 training is also running on the L4.
batch_size: 16
num_workers: 2

encoder_type: 'pgp_encoder'
encoder_args:
  target_agent_feat_size: 5
  target_agent_emb_size: 16
  target_agent_enc_size: 32
  node_feat_size: 6
  node_emb_size: 16
  node_enc_size: 32
  nbr_feat_size: 5
  nbr_emb_size: 16
  nbr_enc_size: 32
  num_gat_layers: 2

aggregator_type: 'pgp'
aggregator_args:
  pre_train: False
  target_agent_enc_size: 32
  node_enc_size: 32
  pi_h1_size: 32
  pi_h2_size: 32
  horizon: 15
  num_samples: 1000
  emb_size: 128
  num_heads: 32

decoder_type: 'lvm_ranked'
decoder_args:
  num_samples: 1000
  op_len: 12
  hidden_size: 128
  encoding_size: 160
  agg_type: 'sample_specific'
  lv_dim: 5
  num_clusters: 10
  conf_hidden_size: 128

optim_args:
  lr: 0.001
  scheduler_step: 10
  scheduler_gamma: 0.5

# Loss = reconstruction (min_ade_k) + lane-policy BC (pi_bc) + rank-aware
# confidence training (ranking_xent). Rank weight 1.0 matches min_ade_k so the
# confidence head is treated as a first-class objective.
losses: ['min_ade_k', 'pi_bc', 'ranking_xent']
loss_weights: [1, 0.5, 1.0]
loss_args:
  - k: 10
  - dummy: 0
  - temperature: 1.0
    use_softmax_target: False

tr_metrics: ['min_ade_k', 'miss_rate_k', 'pi_bc', 'top1_ade', 'ranking_xent']
tr_metric_args:
  - k: 10
  - k: 10
    dist_thresh: 2
  - dummy: 0
  - dummy: 0
  - temperature: 1.0

val_metrics: ['min_ade_k', 'min_ade_k', 'miss_rate_k', 'miss_rate_k', 'pi_bc', 'top1_ade', 'ranking_xent']
val_metric_args:
  - k: 5
  - k: 10
  - k: 5
    dist_thresh: 2
  - k: 10
    dist_thresh: 2
  - dummy: 0
  - dummy: 0
  - temperature: 1.0

log_freq: 100
